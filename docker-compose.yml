services:
  postgres:
    image: postgres:16
    container_name: linea-postgres
    restart: always
    environment:
      POSTGRES_USER: linea
      POSTGRES_PASSWORD: linea_password
      POSTGRES_DB: linea_db
    ports:
      - "5432:5432"
    volumes:
      - linea_postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  qdrant:
    image: qdrant/qdrant:latest
    container_name: linea-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - linea_qdrant_data:/qdrant/storage

  n8n:
    image: n8nio/n8n:latest
    container_name: linea-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: linea_db
      DB_POSTGRESDB_USER: linea
      DB_POSTGRESDB_PASSWORD: linea_password
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: admin
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
    depends_on:
      - postgres
    volumes:
      - linea_n8n_data:/home/node/.n8n

volumes:
  linea_postgres_data:
  linea_qdrant_data:
  linea_n8n_data: